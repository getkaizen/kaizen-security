name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest langchain langchain-core openai-agents mcp opentelemetry-sdk
      - name: Test
        working-directory: python
        run: pytest -q

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: typescript
        run: npm install
      - name: Test
        working-directory: typescript
        run: npm test
      - name: Build
        working-directory: typescript
        run: npm run build
